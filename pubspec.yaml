name: v_astra_create
description: "V Astra Create - AI-powered mobile app generator with subscription management and AdMob integration"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # =========================================================================
  # CORE DEPENDENCIES
  # =========================================================================

  # State Management
  provider: ^6.4.0
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  firebase_firestore: ^4.13.0

  # Google Play Billing
  in_app_purchase: ^3.1.0
  in_app_purchase_android: ^3.1.0
  in_app_purchase_storekit: ^3.1.0

  # AdMob
  google_mobile_ads: ^4.0.0

  # WebView for in-app browser
  flutter_inappwebview: ^6.0.0

  # UI & Design
  flutter_svg: ^2.0.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

  # Navigation
  go_router: ^12.0.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.2
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.0.0
  intl: ^0.19.0
  connectivity_plus: ^5.0.0
  package_info_plus: ^5.0.0

  # Logging
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  # =========================================================================
  # ASSETS
  # =========================================================================

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/legal/
